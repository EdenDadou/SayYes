name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code source
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Configuration de l'accès SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.PRIVATEKEY }}

      # 3. Ajouter le VPS aux hôtes connus (évite les blocages avec StrictHostKeyChecking)
      - name: Add VPS to known hosts
        run: ssh-keyscan -p 49999 141.95.53.183 >> ~/.ssh/known_hosts

      # 4. Déploiement de l'application
      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no debian@141.95.53.183 -p 49999 << 'EOF'
          set -e
          echo "🛰️ Connexion SSH réussie."
          cd /var/www/remix || { echo "❌ Échec : dossier introuvable"; exit 1; }

          echo "📦 Pull du dépôt..."
          # Sauvegarder les changements locaux s'il y en a
          git stash push -m "Auto-stash before deployment $(date)" || true
          # Forcer le pull en cas de conflit
          git fetch origin main
          git reset --hard origin/main || { echo "❌ Échec git reset"; exit 1; }

          echo "🧹 Nettoyage préventif du disque..."
          # Supprimer les vieux backups DB (garder les 3 derniers)
          ls -t ./prisma/dev.db.backup.* 2>/dev/null | tail -n +4 | xargs rm -f || true
          # Vider le cache npm global (principale source d'inodes épuisés)
          npm cache clean --force 2>/dev/null || true
          # Supprimer les anciens artefacts de build
          rm -rf build/ .cache/ .vite-dev-cache/ 2>/dev/null || true
          # Tronquer les gros fichiers de logs PM2
          find ./logs -name "*.log" -size +10M -exec truncate -s 0 {} \; 2>/dev/null || true
          # Forcer la suppression de node_modules pour éviter des restes corrompus
          rm -rf node_modules 2>/dev/null || true
          echo "✅ Nettoyage terminé. Espace disque disponible :"
          df -h . || true

          echo "📦 Installation des dépendances..."
          # npm ci installe exactement le package-lock.json (déterministe, plus rapide)
          npm ci --legacy-peer-deps || { echo "❌ Échec npm ci"; exit 1; }

          echo "🗄️ Configuration de la base de données..."
          # Créer le fichier .env avec DATABASE_URL
          echo "DATABASE_URL=file:./prisma/dev.db" > .env
          echo "📋 Fichier .env créé avec DATABASE_URL"
          # Configurer aussi pour le script actuel
          export DATABASE_URL="file:./prisma/dev.db"
          echo "📋 DATABASE_URL configuré: $DATABASE_URL"

          # Vérifier le statut des migrations
          echo "📋 Vérification du statut des migrations..."
          MIGRATION_STATUS=$(npx prisma migrate status --schema=./prisma/schema.prisma 2>&1 || echo "NEEDS_MIGRATION")

          if echo "$MIGRATION_STATUS" | grep -q "Database schema is up to date"; then
            echo "✅ Base de données déjà à jour."
          else
            echo "📋 Sauvegarde de la base de données..."
            # Créer une sauvegarde avant les migrations
            if [ -f "./prisma/dev.db" ]; then
              cp ./prisma/dev.db ./prisma/dev.db.backup.$(date +%Y%m%d_%H%M%S)
              echo "✅ Sauvegarde créée."
              # Garder seulement les 3 derniers backups pour ne pas remplir le disque
              ls -t ./prisma/dev.db.backup.* 2>/dev/null | tail -n +4 | xargs rm -f || true
            fi
            
            echo "📋 Application des migrations..."
            # Essayer d'abord migrate deploy
            if ! npx prisma migrate deploy 2>&1; then
              echo "⚠️ Échec des migrations classiques. Vérification si c'est un problème de baseline..."
              
              # Vérifier si c'est l'erreur P3005 (base de données non vide)
              DEPLOY_ERROR=$(npx prisma migrate deploy 2>&1 || true)
              if echo "$DEPLOY_ERROR" | grep -q "P3005\|database schema is not empty"; then
                echo "📋 Détection d'une base de données existante non baselinée. Application du baseline..."
                
                # Marquer toutes les migrations existantes comme appliquées
                for migration_dir in prisma/migrations/*/; do
                  if [ -d "$migration_dir" ]; then
                    migration_name=$(basename "$migration_dir")
                    echo "📋 Marquage de la migration $migration_name comme appliquée..."
                    npx prisma migrate resolve --applied "$migration_name" || true
                  fi
                done
                
                echo "📋 Tentative de déploiement après baseline..."
                npx prisma migrate deploy || {
                  echo "❌ Échec après baseline. Utilisation de db push en dernier recours..."
                  npx prisma db push --accept-data-loss || { echo "❌ Échec définitif"; exit 1; }
                }
              else
                echo "❌ Erreur de migration non liée au baseline: $DEPLOY_ERROR"
                exit 1
              fi
            fi
            echo "✅ Migrations appliquées avec succès."
          fi

          # Générer le client Prisma
          echo "📋 Génération du client Prisma..."
          npx prisma generate || { echo "❌ Échec prisma generate"; exit 1; }
          echo "✅ Client Prisma généré avec succès."

          echo "✅ Base de données configurée."

          echo "📁 Création des dossiers nécessaires..."
          # Créer le dossier uploads pour les médias
          mkdir -p public/uploads/portfolio
          mkdir -p public/uploads/portfolio/bento
          chmod 755 public/uploads -R || true

          # Créer le dossier logs pour PM2
          mkdir -p logs
          chmod 755 logs || true

          echo "✅ Dossiers créés."

          echo "🏗️ Build de l'application..."
          echo "📋 Démarrage du build (cela peut prendre quelques minutes)..."
          # S'assurer que DATABASE_URL est disponible pour le build
          export DATABASE_URL="file:./prisma/dev.db"
          timeout 300 npm run build || { echo "❌ Échec npm build (timeout ou erreur)"; exit 1; }
          echo "✅ Build terminé avec succès."

          echo "🔄 Synchronisation finale du schéma de base de données..."
          npx prisma db push || { echo "❌ Échec prisma db push - vérifiez si des changements destructifs sont nécessaires"; exit 1; }
          echo "✅ Schéma de base de données synchronisé."

          echo "🚀 Redémarrage de l'application via PM2..."
          pm2 restart remix-app || { echo "❌ Échec PM2 restart"; exit 1; }

          echo "✅ Déploiement terminé avec succès."
          EOF
